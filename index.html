    <!-- Visualization & Content Choices: 
        - [PJOK] Info: Komponen kebugaran jasmani & latihannya. Goal: Membandingkan & menghubungkan. Viz: Radar Chart (Chart.js) untuk visualisasi komponen kebugaran yang multidimensional. Interaction: Hover pada titik data. Justification: Lebih menarik dan informatif daripada tabel statis.
        - [PJOK & Lainnya] Info: Daftar teknik/konsep. Goal: Mengorganisir. Method: Kartu interaktif (HTML/Tailwind) dengan efek hover dan accordion (collapsible sections). Interaction: Klik untuk membuka/menutup detail. Justification: Menghemat ruang dan mencegah pengguna kewalahan oleh informasi.
        - [Pancasila] Info: Hierarki Peraturan Perundang-undangan. Goal: Menunjukkan struktur. Method: Diagram visual dibuat dengan HTML/CSS (div bersarang dengan border). Interaction: Hover untuk highlight. Justification: Representasi visual lebih mudah dipahami daripada daftar bernomor.
        - [Fisika] Info: Hakikat Fisika (Produk, Proses, Sikap). Goal: Membandingkan & menjelaskan. Method: Tiga kartu informatif berdampingan. Interaction: Efek hover. Justification: Memudahkan perbandingan langsung.
        - [Fisika] Info: Langkah Metode Ilmiah. Goal: Menunjukkan urutan. Method: Stepper vertikal dengan HTML/CSS. Interaction: Highlight pada item aktif. Justification: Menggambarkan alur proses secara efektif.
    -->
    <style>

        const navPjok = document.getElementById('nav-pjok');
        const navPancasila = document.getElementById('nav-pancasila');
        const navFisika = document.getElementById('nav-fisika');
        const sidebarContainer = document.getElementById('sidebar-container');
        const contentDisplay = document.getElementById('content-display');
        let currentChart = null;
        
        function createAccordion(id, title, content) {
            return `
                <div class="border border-stone-200 rounded-lg">
                    <button id="accordion-btn-${id}" class="w-full flex justify-between items-center text-left p-4 bg-stone-50 hover:bg-stone-100 rounded-lg focus:outline-none">
                        <span class="font-semibold text-stone-700">${title}</span>
                        <span class="transform transition-transform duration-300">▼</span>
                    </button>
                    <div id="accordion-content-${id}" class="accordion-content px-4">
                        <div class="py-4 border-t border-stone-200">${content}</div>
                    </div>
                </div>`;
        }
        
        function createStepperItem(title, description) {
            return `
                <div class="flex items-start gap-4 stepper-item">
                    <div class="flex-shrink-0 w-8 h-8 bg-sky-100 text-sky-700 font-bold rounded-full flex items-center justify-center"></div>
                    <div>
                        <h4 class="font-semibold">${title}</h4>
                        <p class="text-sm text-stone-600">${description}</p>
                    </div>
                </div>
            `;
        }

        function setActiveNav(activeButton) {
            [navPjok, navPancasila, navFisika].forEach(btn => {
                btn.classList.remove('bg-sky-600', 'text-white');
                btn.classList.add('text-stone-700');
            });
            activeButton.classList.add('bg-sky-600', 'text-white');
            activeButton.classList.remove('text-stone-700');
        }

        function showTopic(subjectKey, topicId) {
            const topicContent = appData[subjectKey].content[topicId];
            contentDisplay.innerHTML = topicContent;
            
            sidebarContainer.querySelectorAll('.sidebar-item').forEach(item => {
                item.classList.remove('bg-sky-100', 'text-sky-800', 'font-bold');
                if (item.dataset.topicId === topicId) {
                    item.classList.add('bg-sky-100', 'text-sky-800', 'font-bold');
                }
            });

            if (currentChart) {
                currentChart.destroy();
                currentChart = null;
            }

            if (topicId === 'kebugaran') {
                renderKebugaranChart();
            }
            
            document.querySelectorAll('[id^="accordion-btn-"]').forEach(button => {
                button.addEventListener('click', () => {
                    const content = button.nextElementSibling;
                    const icon = button.querySelector('span:last-child');
                    if (content.style.maxHeight) {
                        content.style.maxHeight = null;
                        icon.style.transform = 'rotate(0deg)';
                    } else {
                        content.style.maxHeight = content.scrollHeight + "px";
                        icon.style.transform = 'rotate(180deg)';
                    }
                });
            });
            
            updateStepperNumbers();
        }

        function showSubject(subjectKey) {
            const subjectData = appData[subjectKey];
            sidebarContainer.innerHTML = `
                <div class="bg-white rounded-xl shadow-md p-4 sticky top-8">
                    <h3 class="text-lg font-bold text-sky-800 mb-4 border-b pb-2">${subjectData.title}</h3>
                    <div class="space-y-1">
                        ${subjectData.sidebar.map(item => `
                            <a href="#" class="sidebar-item block w-full text-left px-4 py-2 rounded-md text-stone-600 hover:bg-sky-100 hover:text-sky-800" data-topic-id="${item.id}">
                                ${item.title}
                            </a>
                        `).join('')}
                    </div>
                </div>`;

            sidebarContainer.querySelectorAll('.sidebar-item').forEach(item => {
                item.addEventListener('click', (e) => {
                    e.preventDefault();
                    showTopic(subjectKey, item.dataset.topicId);
                });
            });

            showTopic(subjectKey, subjectData.sidebar[0].id);
        }
        
        function updateStepperNumbers() {
            const stepperItems = document.querySelectorAll('#scientific-method-stepper .stepper-item');
            stepperItems.forEach((item, index) => {
                const circle = item.querySelector('div:first-child');
                circle.textContent = index + 1;
            });
        }
        
        function renderKebugaranChart() {
            const ctx = document.getElementById('kebugaranChart').getContext('2d');
            const data = {
                labels: ['Kekuatan', 'Kecepatan', 'Kelenturan', 'Daya Tahan', 'Kelincahan', 'Keseimbangan', 'Koordinasi', 'Daya Ledak', 'Ketepatan', 'Reaksi'],
                datasets: [{
                    label: 'Komponen Kebugaran Jasmani',
                    data: [8, 9, 7, 10, 9, 7, 8, 9, 6, 8],
                    fill: true,
                    backgroundColor: 'rgba(56, 189, 248, 0.2)',
                    borderColor: 'rgb(56, 189, 248)',
                    pointBackgroundColor: 'rgb(56, 189, 248)',
                    pointBorderColor: '#fff',
                    pointHoverBackgroundColor: '#fff',
                    pointHoverBorderColor: 'rgb(56, 189, 248)'
                }]
            };
            const tooltips = {
                Kekuatan: 'Contoh: Push-up, Sit-up',
                Kecepatan: 'Contoh: Lari sprint 50m',
                Kelenturan: 'Contoh: Kayang, Cium lutut',
                'Daya Tahan': 'Contoh: Lari 2.4 km',
                Kelincahan: 'Contoh: Lari zig-zag',
                Keseimbangan: 'Contoh: Berdiri satu kaki',
                Koordinasi: 'Contoh: Melempar & menangkap bola',
                'Daya Ledak': 'Contoh: Squat jump',
                Ketepatan: 'Contoh: Memanah, menembak',
                Reaksi: 'Contoh: Menangkap benda jatuh',
            }

            currentChart = new Chart(ctx, {
                type: 'radar',
                data: data,
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    elements: { line: { tension: 0.1 } },
                    plugins: {
                        tooltip: {
                            callbacks: {
                                afterLabel: function(context) {
                                    return tooltips[context.label] || '';
                                }
                            }
                        },
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        r: {
                            angleLines: { display: true },
                            suggestedMin: 0,
                            suggestedMax: 10,
                            pointLabels: { font: { size: 11 } },
                            ticks: { backdropColor: 'rgba(255, 255, 255, 0.75)' }
                        }
                    }
                }
            });
        }


        navPjok.addEventListener('click', () => {
            setActiveNav(navPjok);
            showSubject('pjok');
        });
        navPancasila.addEventListener('click', () => {
            setActiveNav(navPancasila);
            showSubject('pancasila');
        });
        navFisika.addEventListener('click', () => {
            setActiveNav(navFisika);
            showSubject('fisika');
        });

    </script>
</body>
